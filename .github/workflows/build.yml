name: Build Executables

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install leveldb
          echo "LDFLAGS=-L/opt/homebrew/opt/leveldb/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I/opt/homebrew/opt/leveldb/include" >> $GITHUB_ENV

      - name: Install Python dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          pip install pyinstaller plyvel leveldb
          pip install pyinstaller-hooks-contrib

      - name: Install Python dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libleveldb-dev libleveldb1
          pip install pyinstaller plyvel leveldb
          pip install pyinstaller-hooks-contrib

      - name: Build Linux executable
        if: runner.os == 'Linux'
        run: |
          pyinstaller --onefile \
            --hidden-import=plyvel \
            --hidden-import=leveldb \
            --collect-all=plyvel \
            --name audit-linux \
            audit.py
          ls -la dist/

      - name: Verify Linux build
        if: runner.os == 'Linux'
        run: |
          echo "Testing executable..."
          dist/audit-linux --help > /dev/null 2>&1 && echo "[OK] Executable runs successfully" || echo "[ERROR] Executable failed to run"

      - name: Build macOS executable
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile \
            --hidden-import=plyvel \
            --hidden-import=leveldb \
            --collect-all=plyvel \
            --name audit-macos \
            audit.py
          ls -la dist/

      - name: Verify macOS build
        if: runner.os == 'macOS'
        run: |
          echo "Testing executable..."
          dist/audit-macos --help > /dev/null 2>&1 && echo "[OK] Executable runs successfully" || echo "[ERROR] Executable failed to run"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executables-${{ runner.os }}
          path: dist/audit-*

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/audit-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
