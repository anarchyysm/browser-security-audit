name: Build Executables

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y shc
          else
            brew install shc
          fi
        shell: bash

      - name: Build Linux executable
        if: runner.os == 'Linux'
        run: |
          shc -f audit.sh -o audit-linux
          chmod +x audit-linux
          ls -la audit-linux

      - name: Build macOS executable
        if: runner.os == 'macOS'
        run: |
          shc -f audit.sh -o audit-macos
          chmod +x audit-macos
          ls -la audit-macos

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executables-${{ runner.os }}
          path: audit-*

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: audit-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

