name: Build Executables

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install leveldb
          echo "LDFLAGS=-L/opt/homebrew/opt/leveldb/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I/opt/homebrew/opt/leveldb/include" >> $GITHUB_ENV

      - name: Install Python dependencies (macOS)
        if: runner.os == 'macOS'
        run: pip install pyinstaller plyvel

      - name: Install Python dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libleveldb-dev libleveldb1
          pip install pyinstaller plyvel

      - name: Build executables
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            pyinstaller --onefile --hidden-import=plyvel --name audit-linux audit.py
          else
            pyinstaller --onefile --hidden-import=plyvel --name audit-macos audit.py
          fi
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executables-${{ runner.os }}
          path: dist/audit-*

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/audit-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
